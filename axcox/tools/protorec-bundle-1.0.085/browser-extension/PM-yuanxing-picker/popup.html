<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PM原型拾取器</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            width: 320px;
            min-height: 380px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 0;
            margin: 0;
            background: linear-gradient(180deg, #f7faff 0%, #ffffff 100%);
            color: #1f2937;
        }
        .container {
            padding: 20px 18px 18px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }
        .header-main {
            min-width: 0;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title {
            font-size: 17px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0;
            flex-shrink: 0;
        }
        .version-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
            padding: 3px 12px 4px 10px;
            border-radius: 999px;
            font-size: 14px;
            line-height: 1;
            color: #8f96a3;
            letter-spacing: 0.4px;
            text-decoration: none;
            font-weight: 400;
            font-style: italic;
            font-family: Georgia, 'Times New Roman', serif;
            background: transparent;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
            transition: background-color 0.2s ease, color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }
        .version-link:hover {
            background: #f3f4f6;
            color: #6b7280;
            transform: rotate(-3deg);
        }
        .version-link:active {
            opacity: 0.78;
            transform: rotate(-2deg) scale(0.98);
        }
        .subtitle {
            font-size: 12px;
            line-height: 1.5;
            color: #6b7280;
            margin-bottom: 16px;
        }
        .panel {
            border-radius: 16px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            padding: 14px;
            margin-bottom: 14px;
        }
        .endpoint-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            margin-bottom: 12px;
        }
        .endpoint-main {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .endpoint-label {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
            flex-shrink: 0;
        }
        .endpoint-value {
            font-size: 13px;
            font-weight: 700;
            color: #1d4ed8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .endpoint-value.is-offline {
            color: #dc2626;
        }
        .endpoint-status {
            width: auto;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            line-height: 1.4;
            border-radius: 999px;
            background: #f3f4f6;
            color: #6b7280;
            white-space: nowrap;
            border: none;
            cursor: default;
            box-shadow: none;
            transform: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .endpoint-status.is-connected {
            background: #dcfce7;
            color: #15803d;
        }
        .endpoint-status.is-pending {
            background: #fef3c7;
            color: #b45309;
        }
        .endpoint-status.is-offline {
            background: #fee2e2;
            color: #b91c1c;
        }
        .endpoint-status.is-actionable {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.2);
        }
        .endpoint-status.is-actionable:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(37, 99, 235, 0.24);
        }
        .endpoint-status.is-connected:hover {
            transform: none;
            box-shadow: none;
        }
        .endpoint-status.is-actionable:disabled {
            cursor: not-allowed;
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }
        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .progress-title {
            font-size: 13px;
            font-weight: 600;
            color: #111827;
        }
        .badge {
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            background: #f3f4f6;
            padding: 4px 8px;
            border-radius: 999px;
        }
        .badge.is-idle {
            color: #6b7280;
            background: #f3f4f6;
        }
        .badge.is-running {
            color: #b45309;
            background: #fef3c7;
        }
        .badge.is-success {
            color: #15803d;
            background: #dcfce7;
        }
        .badge.is-error {
            color: #b91c1c;
            background: #fee2e2;
        }
        .loader-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .loader {
            width: 28px;
            height: 28px;
            border: 3px solid #dbeafe;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
            display: none;
        }
        .loader.active {
            display: block;
        }
        .pulse {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, #dbeafe 20%, #93c5fd 50%, #dbeafe 80%);
            background-size: 200% 100%;
            animation: shimmer 1.2s linear infinite;
            display: none;
        }
        .pulse.active {
            display: block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .step-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #6b7280;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d1d5db;
            flex-shrink: 0;
        }
        .step.running .step-dot {
            background: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
        }
        .step.done .step-dot {
            background: #16a34a;
        }
        .step.running,
        .step.done {
            color: #111827;
        }
        .status-card {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 14px;
            padding: 12px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
        }
        .success-icon {
            display: none;
            color: #16a34a;
            font-size: 20px;
            line-height: 1;
        }
        .success-icon.visible {
            display: block;
        }
        .status-text {
            flex: 1;
            min-width: 0;
        }
        #status {
            font-size: 12px;
            color: #374151;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #status.is-dynamic {
            color: #111827;
            font-weight: 600;
            animation: status-glow 0.8s ease-in-out infinite alternate;
        }
        .tip {
            margin-top: 8px;
            font-size: 11px;
            line-height: 1.5;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @keyframes status-glow {
            from {
                opacity: 0.72;
                transform: translateY(0);
            }
            to {
                opacity: 1;
                transform: translateY(-1px);
            }
        }
        .service-guide {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20;
            padding: 18px;
            background: rgba(15, 23, 42, 0.22);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .service-guide.visible {
            display: flex;
        }
        .service-guide-panel {
            position: relative;
            width: 100%;
            border-radius: 16px;
            padding: 16px 14px 14px;
            background: linear-gradient(180deg, #fff9ef 0%, #fffdf8 100%);
            border: 1px solid #fde7bf;
            box-shadow: 0 18px 44px rgba(15, 23, 42, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }
        .service-guide-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            padding: 0;
            border-radius: 999px;
            border: 1px solid #f2d39a;
            background: rgba(255, 255, 255, 0.88);
            color: #a16207;
            font-size: 14px;
            line-height: 24px;
            box-shadow: none;
            transform: none;
        }
        .service-guide-close:hover {
            background: #fff7e6;
            box-shadow: none;
            transform: none;
        }
        .service-guide-title {
            font-size: 12px;
            font-weight: 700;
            color: #9a6700;
            margin-bottom: 6px;
        }
        .service-guide-text {
            font-size: 11px;
            line-height: 1.6;
            color: #7c5a10;
        }
        .service-guide-section {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid #f7ddb0;
        }
        .service-guide-list {
            margin-top: 0;
        }
        .service-guide-item {
            font-size: 11px;
            line-height: 1.6;
            color: #7c5a10;
        }
        .service-guide-item + .service-guide-item {
            margin-top: 2px;
        }
        .service-guide-item strong {
            color: #9a6700;
        }
        .service-guide-command {
            margin-top: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px dashed #f4c56d;
            font-size: 11px;
            font-weight: 600;
            color: #8a5a00;
            letter-spacing: 0.2px;
            word-break: break-all;
        }
        .service-guide-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .service-guide-tip {
            display: none;
            margin-top: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 11px;
            line-height: 1.5;
            border: 1px solid transparent;
        }
        .service-guide-tip.visible {
            display: block;
        }
        .service-guide-tip.is-info {
            background: #eff6ff;
            border-color: #bfdbfe;
            color: #1d4ed8;
        }
        .service-guide-tip.is-success {
            background: #ecfdf3;
            border-color: #bbf7d0;
            color: #15803d;
        }
        .service-guide-tip.is-error {
            background: #fef2f2;
            border-color: #fecaca;
            color: #b91c1c;
        }
        .service-guide-btn {
            flex: 1;
            width: auto;
            padding: 9px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid transparent;
            box-shadow: none;
            transform: none;
        }
        .service-guide-btn:hover {
            box-shadow: none;
            transform: none;
        }
        .service-guide-btn.secondary {
            background: #ffffff;
            border-color: #f4d28a;
            color: #9a6700;
        }
        .service-guide-btn.secondary:hover {
            background: #fff7e6;
        }
        .service-guide-btn.primary {
            background: linear-gradient(135deg, #f6c76b 0%, #f0b646 100%);
            color: #6f4400;
        }
        .service-guide-btn.primary:hover {
            background: linear-gradient(135deg, #f8d386 0%, #f3be59 100%);
        }
        .service-guide-btn.link {
            background: #fff7e6;
            border-color: #f3cd83;
            color: #8a5a00;
        }
        .service-guide-btn.link:hover {
            background: #fff2d7;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #2f6df6 0%, #2563eb 55%, #1d4ed8 100%);
            color: white;
            border: none; 
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
        }
        button:hover {
            background: linear-gradient(135deg, #3b7bff 0%, #2563eb 58%, #1e40af 100%);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
            transform: translateY(-1px);
        }
        button:disabled {
            background: #cbd5e0;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }
        .secondary-btn {
            display: none;
            background: #111827;
        }
        .secondary-btn.visible {
            display: block;
        }
        .secondary-btn:hover {
            background: #030712;
        }
        .lock-text {
            margin-top: 10px;
            text-align: center;
            font-size: 11px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-main">
                <div class="title">PM原型拾取器</div>
                <a id="version-link" class="version-link" href="https://lurenyi.me" target="_blank" rel="noreferrer">v1.0.085</a>
            </div>
        </div>
        <div class="subtitle">辅助PM还原页面给AI，进行二次原型编辑</div>

        <div class="panel">
            <div id="endpoint-card" class="endpoint-card">
                <div class="endpoint-main">
                    <div class="endpoint-label">服务连接：</div>
                    <div id="endpoint-value" class="endpoint-value">检测中...</div>
                </div>
                <button id="endpoint-status" class="endpoint-status" type="button">连接服务</button>
            </div>
            <div class="progress-header">
                <div class="progress-title">抓取执行过程</div>
                <div id="phase-badge" class="badge">待开始</div>
            </div>
            <div class="loader-wrap">
                <div id="loader" class="loader"></div>
                <div id="pulse" class="pulse"></div>
            </div>
            <div class="step-list">
                <div class="step" data-step="health">
                    <div class="step-dot"></div>
                    <div>检查本地服务</div>
                </div>
                <div class="step" data-step="capture">
                    <div class="step-dot"></div>
                    <div>抓取当前页面</div>
                </div>
                <div class="step" data-step="save">
                    <div class="step-dot"></div>
                    <div>同步资源与代码</div>
                </div>
                <div class="step" data-step="restore">
                    <div class="step-dot"></div>
                    <div>自动还原页面</div>
                </div>
            </div>

            <div class="status-card">
                <div id="success-view" class="success-icon">✓</div>
                <div class="status-text">
                    <div id="status">准备就绪，点击开始抓取</div>
                    <div id="tip" class="tip">执行过程中会动态展示当前处理对象；关闭弹窗将自动取消本次同步。</div>
                </div>
            </div>
            <div id="service-guide" class="service-guide">
                <div class="service-guide-panel">
                    <button id="close-service-guide" class="service-guide-close" type="button">×</button>
                    <div class="service-guide-title">运行同步工具需要连接本地服务</div>
                    <div class="service-guide-text">当前未检测到本地服务，请选择一种方式继续：</div>
                    <div class="service-guide-section">
                        <div class="service-guide-list">
                            <div class="service-guide-item"><strong>已有本地服务</strong></div>
                            <div class="service-guide-item">复制命令，回到 AI 工具发送给 AI 启动服务</div>
                        </div>
                        <div class="service-guide-command">npm run dev</div>
                        <div class="service-guide-actions">
                            <button id="copy-dev-command" class="service-guide-btn secondary" type="button">复制命令</button>
                            <button id="refresh-server" class="service-guide-btn primary" type="button">重新检测</button>
                        </div>
                        <div id="service-guide-tip" class="service-guide-tip" aria-live="polite"></div>
                    </div>
                    <div class="service-guide-section">
                        <div class="service-guide-list">
                            <div class="service-guide-item"><strong>没有本地服务</strong></div>
                        </div>
                        <div class="service-guide-actions">
                            <button id="download-service-package" class="service-guide-btn link" type="button">访问官网获取服务包</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="go">一键同步到AI</button>
            <button id="preview" class="secondary-btn" type="button">预览还原页面</button>
        </div>
        <div id="lock-text" class="lock-text"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
